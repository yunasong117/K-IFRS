<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>한국채택국제회계기준(K-IFRS)</title>
  <style>
    :root{
      --bg:#f6f7fb;
      --panel:#ffffff;
      --text:#0f172a;
      --muted:#64748b;
      --line:#e5e7eb;
      --line2:#eef2f7;
      --primary:#2563eb;
      --ok:#16a34a;
      --danger:#dc2626;
      --shadow: 0 6px 18px rgba(15, 23, 42, .08);
      --radius:12px;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: var(--sans);
      color:var(--text);
      background: var(--bg);
      padding:24px 16px;
    }

    .wrap{max-width:980px;margin:0 auto}
    .top{
      display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;
      margin-bottom:14px;
    }
    h1{margin:0;font-size:26px;letter-spacing:-.2px;font-weight:700}
    .sub{margin-top:6px;color:var(--muted);font-size:12px;line-height:1.4}
    .right{
      display:flex;gap:10px;align-items:center;flex-wrap:wrap;
    }

    .seg{
      display:flex;
      border:1px solid var(--line);
      background: var(--panel);
      border-radius: 10px;
      overflow:hidden;
      box-shadow: var(--shadow);
    }
    .seg button{
      border:0;
      background:transparent;
      color:var(--muted);
      padding:9px 12px;
      cursor:pointer;
      font-size:12px;
      min-width:84px;
      transition:.15s;
    }
    .seg button.active{
      background: rgba(37, 99, 235, .10);
      color: var(--primary);
      font-weight:600;
    }

    .btn{
      border:1px solid var(--line);
      background: var(--panel);
      color:var(--text);
      padding:9px 12px;
      border-radius:10px;
      cursor:pointer;
      font-size:12px;
      box-shadow: var(--shadow);
      transition:.15s;
      white-space:nowrap;
    }
    .btn:hover{border-color:#cbd5e1}
    .btn.primary{
      border-color: rgba(37,99,235,.35);
      color: var(--primary);
    }

    .grid{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:12px;
    }
    @media (max-width: 900px){
      .grid{grid-template-columns:1fr}
    }

    .card{
      background: var(--panel);
      border:1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .cardHeader{
      padding:12px 14px;
      border-bottom:1px solid var(--line2);
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      background: #fbfcfe;
    }
    .cardHeader strong{font-size:13px}
    .cardHeader span{font-size:12px;color:var(--muted)}
    .badge{
      font-size:12px;
      color:var(--muted);
      padding:6px 10px;
      border:1px solid var(--line);
      border-radius:999px;
      background: #fff;
      font-variant-numeric: tabular-nums;
      white-space:nowrap;
    }
    .cardBody{padding:12px 14px}

    .inputRow{
      display:flex;gap:8px;align-items:center;flex-wrap:wrap;
      margin-bottom:8px;
    }
    .digitInput{
      flex:1;
      min-width:240px;
      padding:10px 12px;
      font-size:14px;
      border:1px solid var(--line);
      border-radius:10px;
      outline:none;
      background:#fff;
      font-family: var(--mono);
      letter-spacing: .16em;
      font-variant-numeric: tabular-nums;
    }
    .digitInput:focus{
      border-color: rgba(37,99,235,.45);
      box-shadow: 0 0 0 4px rgba(37,99,235,.10);
    }

    .msg{
      margin-top:6px;
      padding:9px 10px;
      border-radius:10px;
      border:1px solid var(--line);
      background:#fff;
      color:var(--muted);
      font-size:12px;
      line-height:1.4;
    }
    .msg.info{border-color: rgba(37,99,235,.25); color:#1e40af; background: rgba(37,99,235,.06)}
    .msg.ok{border-color: rgba(22,163,74,.25); color:#166534; background: rgba(22,163,74,.06)}
    .msg.err{border-color: rgba(220,38,38,.25); color:#991b1b; background: rgba(220,38,38,.06)}

    .log{
      margin-top:10px;
      border-top:1px solid var(--line2);
      padding-top:10px;
      display:flex;
      flex-direction:column;
      gap:8px;
      max-height: 320px;
      overflow:auto;
    }

    .item{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      padding:10px 10px;
      border:1px solid var(--line2);
      border-radius:10px;
      background:#fff;
      font-family: var(--mono);
      font-size:12px;
      font-variant-numeric: tabular-nums;
    }
    .item small{color:var(--muted);font-family:var(--sans)}
    .score{
      display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end;
      font-family: var(--mono);
    }
    .chip{
      padding:5px 8px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff;
      font-size:12px;
      color:var(--muted);
      white-space:nowrap;
    }
    .chip.s{color:#1e40af; border-color: rgba(37,99,235,.25); background: rgba(37,99,235,.06)}
    .chip.b{color:#166534; border-color: rgba(22,163,74,.25); background: rgba(22,163,74,.06)}
    .chip.win{color:#166534; border-color: rgba(22,163,74,.35); background: rgba(22,163,74,.10)}
    .hint{margin-top:8px;color:var(--muted);font-size:12px}

    .footer{
      margin-top:12px;
      color: #94a3b8;
      font-size:11px;
      text-align:center;
    }

    /* “걸릴만한” 요소 제거: 선택적으로 제목도 숨기고 싶으면 아래 주석 해제 */
    /* h1{font-size:16px} */
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <h1>한국채택국제회계기준(K-IFRS)</h1>
        <div class="sub">중복 없는 4자리 숫자를 추론합니다. 모드를 변경하여 단독/대결로 실행할 수 있습니다.</div>
      </div>

      <div class="right">
        <div class="seg" role="tablist" aria-label="mode">
          <button id="modeSolo" class="active" type="button">단독</button>
          <button id="modeDuel" type="button">대결</button>
        </div>
        <button id="btnNew" class="btn primary" type="button">새로 시작</button>
        <button id="btnReset" class="btn" type="button">로그 초기화</button>
      </div>
    </div>

    <div class="grid">
      <section class="card" aria-label="player panel">
        <div class="cardHeader">
          <div style="display:flex;flex-direction:column;gap:2px">
            <strong>입력</strong>
            <span id="playerSub">대상 숫자를 입력해 추론 결과를 확인합니다.</span>
          </div>
          <div class="badge" id="playerBadge">시도 0</div>
        </div>

        <div class="cardBody">
          <div class="inputRow">
            <input id="guess" class="digitInput" type="text" inputmode="numeric" maxlength="4" placeholder="4자리 입력" />
            <button id="btnGuess" class="btn primary" type="button">확인</button>
          </div>
          <div id="msgPlayer" class="msg info">준비되었습니다. 4자리 숫자를 입력하세요.</div>

          <div class="log" id="logPlayer"></div>
          <div class="hint">Enter 키로도 확인할 수 있습니다.</div>
        </div>
      </section>

      <section class="card" aria-label="computer panel">
        <div class="cardHeader">
          <div style="display:flex;flex-direction:column;gap:2px">
            <strong>대결 설정</strong>
            <span id="cpuSub">대결 모드에서 내 숫자를 설정하면 자동으로 진행됩니다.</span>
          </div>
          <div class="badge" id="cpuBadge">시도 0</div>
        </div>

        <div class="cardBody">
          <div class="inputRow">
            <input id="mySecret" class="digitInput" type="text" inputmode="numeric" maxlength="4" placeholder="(대결) 내 숫자 설정" />
            <button id="btnSetSecret" class="btn" type="button">설정</button>
          </div>
          <div id="msgCpu" class="msg">대결 모드로 전환 후 내 숫자를 설정하세요.</div>

          <div class="log" id="logCpu"></div>
          <div class="hint">대결 모드: 내 턴 → 컴퓨터 턴 순서로 진행됩니다.</div>
        </div>
      </section>
    </div>

    <div class="footer">local page</div>
  </div>

<script>
  // -----------------------------
  // Core rules (4 unique digits)
  // Leading zero is allowed.
  // -----------------------------
  const DIGITS = [..."0123456789"];

  function shuffle(arr){
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function generateAnswer(){
    const a = shuffle([...DIGITS]);
    return a.slice(0,4).join("");
  }

  function validate4Unique(s){
    if (s.length !== 4) return "4자리로 입력해 주세요.";
    if (!/^\d{4}$/.test(s)) return "숫자만 입력해 주세요.";
    if (new Set(s).size !== 4) return "중복 없는 4자리 숫자여야 합니다.";
    return "";
  }

  function score(ans, g){
    let strikes = 0;
    for (let i=0;i<4;i++) if (ans[i] === g[i]) strikes++;
    let common = 0;
    for (const ch of g) if (ans.includes(ch)) common++;
    return { strikes, balls: common - strikes };
  }

  // -----------------------------
  // UI helpers
  // -----------------------------
  function setMsg(el, text, type=""){
    el.className = "msg" + (type ? " " + type : "");
    el.textContent = text;
  }

  function addLog(logEl, n, guess, s, b, highlight=false){
    const div = document.createElement("div");
    div.className = "item";
    div.innerHTML = `
      <div>
        <div><strong>${n}.</strong> ${guess}</div>
        <small>${highlight ? "완료" : ""}</small>
      </div>
      <div class="score">
        <span class="chip">TRY ${n}</span>
        <span class="chip s">${s}S</span>
        <span class="chip b">${b}B</span>
        ${highlight ? `<span class="chip win">DONE</span>` : ""}
      </div>
    `;
    logEl.prepend(div);
  }

  function sanitizeDigitsInput(inputEl){
    inputEl.value = inputEl.value.replace(/\D/g, "").slice(0,4);
  }

  // -----------------------------
  // Game state
  // -----------------------------
  let mode = "solo"; // "solo" | "duel"
  let cpuSecret = "";
  let mySecret = "";
  let playerTries = 0;
  let cpuTries = 0;
  let duelReady = false;
  let duelOver = false;

  // CPU candidates
  let cpuCandidates = [];
  function buildCandidates(){
    const list = [];
    for (let a=0;a<=9;a++){
      for (let b=0;b<=9;b++){
        if (b===a) continue;
        for (let c=0;c<=9;c++){
          if (c===a || c===b) continue;
          for (let d=0;d<=9;d++){
            if (d===a || d===b || d===c) continue;
            list.push(`${a}${b}${c}${d}`);
          }
        }
      }
    }
    return list;
  }
  function cpuInit(){ cpuCandidates = buildCandidates(); }
  function cpuPickGuess(){
    const idx = Math.floor(Math.random() * cpuCandidates.length);
    return cpuCandidates[idx];
  }
  function cpuApplyFeedback(guess, s, b){
    cpuCandidates = cpuCandidates.filter(candidate => {
      const r = score(candidate, guess);
      return r.strikes === s && r.balls === b;
    });
  }

  // -----------------------------
  // Elements
  // -----------------------------
  const elModeSolo = document.getElementById("modeSolo");
  const elModeDuel = document.getElementById("modeDuel");

  const elGuess = document.getElementById("guess");
  const elBtnGuess = document.getElementById("btnGuess");
  const elBtnNew = document.getElementById("btnNew");
  const elBtnReset = document.getElementById("btnReset");

  const elPlayerBadge = document.getElementById("playerBadge");
  const elCpuBadge = document.getElementById("cpuBadge");

  const elPlayerSub = document.getElementById("playerSub");
  const elCpuSub = document.getElementById("cpuSub");

  const elMsgPlayer = document.getElementById("msgPlayer");
  const elMsgCpu = document.getElementById("msgCpu");

  const elLogPlayer = document.getElementById("logPlayer");
  const elLogCpu = document.getElementById("logCpu");

  const elMySecret = document.getElementById("mySecret");
  const elBtnSetSecret = document.getElementById("btnSetSecret");

  // -----------------------------
  // Mode handling
  // -----------------------------
  function setMode(next){
    mode = next;
    duelOver = false;

    elModeSolo.classList.toggle("active", mode === "solo");
    elModeDuel.classList.toggle("active", mode === "duel");

    if (mode === "solo"){
      elPlayerSub.textContent = "대상 숫자를 입력해 추론 결과를 확인합니다.";
      elCpuSub.textContent = "대결 모드에서 내 숫자를 설정하면 자동으로 진행됩니다.";
      setMsg(elMsgCpu, "대결 모드로 전환 후 내 숫자를 설정하세요.");
      duelReady = false;
      mySecret = "";
      elMySecret.value = "";
      elMySecret.disabled = false;
      elBtnSetSecret.disabled = false;
    } else {
      elPlayerSub.textContent = "컴퓨터와 번갈아 진행합니다.";
      elCpuSub.textContent = "내 숫자를 설정하면 컴퓨터가 추론을 시작합니다.";
      setMsg(elMsgCpu, "내 숫자(4자리, 중복 없음)를 먼저 설정해 주세요.", "info");
      duelReady = false;
      mySecret = "";
      elMySecret.value = "";
      elMySecret.disabled = false;
      elBtnSetSecret.disabled = false;
      cpuInit();
    }

    newGame();
  }

  // -----------------------------
  // New game
  // -----------------------------
  function newGame(){
    cpuSecret = generateAnswer();

    playerTries = 0;
    cpuTries = 0;

    elPlayerBadge.textContent = "시도 0";
    elCpuBadge.textContent = "시도 0";

    elLogPlayer.innerHTML = "";
    elLogCpu.innerHTML = "";

    elGuess.value = "";
    elGuess.disabled = false;
    elBtnGuess.disabled = false;

    if (mode === "solo"){
      setMsg(elMsgPlayer, "준비되었습니다. 4자리 숫자를 입력하세요.", "info");
    } else {
      setMsg(elMsgPlayer, "대결 모드: 내 숫자를 설정한 뒤 시작합니다.", "info");
      setMsg(elMsgCpu, "내 숫자(4자리, 중복 없음)를 먼저 설정해 주세요.", "info");
      duelReady = false;
      duelOver = false;
      cpuInit();
    }

    elGuess.focus();
  }

  // -----------------------------
  // Player guess flow
  // -----------------------------
  function playerSubmitGuess(){
    if (duelOver) return;

    const g = elGuess.value.trim();
    const err = validate4Unique(g);
    if (err){
      setMsg(elMsgPlayer, err, "err");
      return;
    }

    if (mode === "duel" && !duelReady){
      setMsg(elMsgPlayer, "먼저 내 숫자를 설정해 주세요. (오른쪽 패널)", "err");
      return;
    }

    playerTries++;
    elPlayerBadge.textContent = `시도 ${playerTries}`;

    const { strikes, balls } = score(cpuSecret, g);
    addLog(elLogPlayer, playerTries, g, strikes, balls, strikes === 4);

    if (strikes === 4){
      if (mode === "solo"){
        setMsg(elMsgPlayer, `완료: 시도 ${playerTries}회`, "ok");
        elGuess.disabled = true;
        elBtnGuess.disabled = true;
        return;
      } else {
        setMsg(elMsgPlayer, `완료: 내 시도 ${playerTries}회`, "ok");
        duelOver = true;
        elGuess.disabled = true;
        elBtnGuess.disabled = true;
        elMySecret.disabled = true;
        elBtnSetSecret.disabled = true;
        setMsg(elMsgCpu, "종료되었습니다. 새로 시작을 눌러 다시 진행하세요.", "info");
        return;
      }
    } else {
      setMsg(elMsgPlayer, `${strikes}S ${balls}B`, "info");
    }

    elGuess.value = "";
    elGuess.focus();

    if (mode === "duel"){
      cpuTurn();
    }
  }

  // -----------------------------
  // Duel: set my secret & CPU turn
  // -----------------------------
  function setMySecret(){
    if (mode !== "duel") return;
    if (duelOver) return;

    const s = elMySecret.value.trim();
    const err = validate4Unique(s);
    if (err){
      setMsg(elMsgCpu, err, "err");
      return;
    }

    mySecret = s;
    duelReady = true;

    elMySecret.disabled = true;
    elBtnSetSecret.disabled = true;

    setMsg(elMsgCpu, "설정 완료. 진행을 시작합니다.", "ok");
    setMsg(elMsgPlayer, "내 턴부터 시작합니다.", "info");
    elGuess.focus();

    cpuInit();
  }

  function cpuTurn(){
    if (mode !== "duel" || !duelReady || duelOver) return;

    const guess = cpuPickGuess();

    cpuTries++;
    elCpuBadge.textContent = `시도 ${cpuTries}`;

    const { strikes, balls } = score(mySecret, guess);
    addLog(elLogCpu, cpuTries, guess, strikes, balls, strikes === 4);

    cpuApplyFeedback(guess, strikes, balls);

    if (strikes === 4){
      setMsg(elMsgCpu, `완료: 컴퓨터 시도 ${cpuTries}회`, "ok");
      duelOver = true;
      elGuess.disabled = true;
      elBtnGuess.disabled = true;
      setMsg(elMsgPlayer, "종료되었습니다. 새로 시작을 눌러 다시 진행하세요.", "info");
      return;
    } else {
      setMsg(elMsgCpu, `컴퓨터 결과: ${strikes}S ${balls}B (후보 ${cpuCandidates.length})`, "info");
    }
  }

  function resetLogs(){
    elLogPlayer.innerHTML = "";
    elLogCpu.innerHTML = "";
    playerTries = 0;
    cpuTries = 0;
    elPlayerBadge.textContent = "시도 0";
    elCpuBadge.textContent = "시도 0";
    setMsg(elMsgPlayer, "로그를 초기화했습니다.", "info");
    setMsg(elMsgCpu, mode === "duel" ? (duelReady ? "진행 중" : "내 숫자를 설정하면 시작합니다.") : "대결 모드로 전환하면 설정할 수 있습니다.", "info");
    elGuess.focus();
  }

  // Events
  elModeSolo.addEventListener("click", () => setMode("solo"));
  elModeDuel.addEventListener("click", () => setMode("duel"));

  elBtnNew.addEventListener("click", newGame);
  elBtnReset.addEventListener("click", resetLogs);

  elBtnGuess.addEventListener("click", playerSubmitGuess);
  elGuess.addEventListener("keydown", (e) => { if (e.key === "Enter") playerSubmitGuess(); });
  elGuess.addEventListener("input", () => sanitizeDigitsInput(elGuess));

  elBtnSetSecret.addEventListener("click", setMySecret);
  elMySecret.addEventListener("keydown", (e) => { if (e.key === "Enter") setMySecret(); });
  elMySecret.addEventListener("input", () => sanitizeDigitsInput(elMySecret));

  // Init
  setMode("solo");
</script>
</body>
</html>
