<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>숫자야구 4자리</title>
  <style>
    :root{
      --bg1:#0b1020;
      --bg2:#0b1633;
      --card:#0f1b3a;
      --card2:#101f44;
      --text:#e9ecff;
      --muted:#aab1da;
      --line:rgba(255,255,255,.12);
      --accent:#7c5cff;
      --accent2:#22c55e;
      --danger:#ff4d6d;
      --shadow: 0 18px 55px rgba(0,0,0,.45);
      --radius:18px;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      color:var(--text);
      background:
        radial-gradient(1000px 600px at 20% 0%, rgba(124,92,255,.35), transparent 60%),
        radial-gradient(900px 550px at 85% 30%, rgba(34,197,94,.22), transparent 60%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
      min-height:100vh;
      padding:28px 16px;
    }

    .wrap{max-width:980px;margin:0 auto}
    .top{
      display:flex;align-items:flex-start;justify-content:space-between;gap:14px;flex-wrap:wrap;
      margin-bottom:16px;
    }
    .title{
      display:flex;flex-direction:column;gap:6px;
    }
    h1{
      margin:0;
      font-size:22px;
      letter-spacing:-0.3px;
    }
    .sub{
      color:var(--muted);
      font-size:13px;
      line-height:1.35;
    }

    .pillbar{
      display:flex; gap:10px; align-items:center; flex-wrap:wrap;
    }
    .pill{
      border:1px solid var(--line);
      background: rgba(255,255,255,.05);
      padding:9px 12px;
      border-radius:999px;
      display:flex;
      gap:10px;
      align-items:center;
      box-shadow: 0 8px 22px rgba(0,0,0,.18);
    }

    .seg{
      display:flex; border:1px solid var(--line);
      background: rgba(255,255,255,.04);
      border-radius:999px;
      overflow:hidden;
    }
    .seg button{
      border:0;
      background:transparent;
      color:var(--muted);
      padding:9px 12px;
      cursor:pointer;
      font-size:13px;
      transition:.15s;
      min-width:86px;
    }
    .seg button.active{
      background: rgba(124,92,255,.22);
      color: var(--text);
    }
    .seg button:hover{color:var(--text)}

    .grid{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:14px;
    }
    @media (max-width: 900px){
      .grid{grid-template-columns:1fr}
    }

    .card{
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border:1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .cardHeader{
      padding:14px 16px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      border-bottom:1px solid var(--line);
      background: rgba(0,0,0,.14);
    }
    .cardHeader .h{
      display:flex; flex-direction:column; gap:2px;
    }
    .cardHeader .h strong{font-size:14px}
    .cardHeader .h span{font-size:12px;color:var(--muted)}
    .badge{
      font-size:12px;
      color: var(--text);
      padding:6px 10px;
      border-radius:999px;
      border:1px solid var(--line);
      background: rgba(255,255,255,.05);
      font-variant-numeric: tabular-nums;
      white-space:nowrap;
    }

    .cardBody{padding:14px 16px}

    .inputRow{
      display:flex; gap:10px; align-items:center; flex-wrap:wrap;
      margin-bottom:10px;
    }

    .digitInput{
      flex:1;
      min-width:220px;
      padding:12px 12px;
      font-size:16px;
      color:var(--text);
      background: rgba(0,0,0,.18);
      border:1px solid var(--line);
      border-radius: 14px;
      outline:none;
      letter-spacing: 0.18em;
      font-variant-numeric: tabular-nums;
    }
    .digitInput:focus{
      border-color: rgba(124,92,255,.55);
      box-shadow: 0 0 0 4px rgba(124,92,255,.18);
    }

    .btn{
      border:1px solid var(--line);
      background: rgba(255,255,255,.06);
      color:var(--text);
      padding:11px 12px;
      border-radius: 14px;
      cursor:pointer;
      font-size:13px;
      transition:.15s transform, .15s background;
      white-space:nowrap;
    }
    .btn:hover{background: rgba(255,255,255,.10)}
    .btn:active{transform: translateY(1px)}
    .btn.primary{
      background: linear-gradient(180deg, rgba(124,92,255,.65), rgba(124,92,255,.35));
      border-color: rgba(124,92,255,.55);
    }
    .btn.primary:hover{background: linear-gradient(180deg, rgba(124,92,255,.78), rgba(124,92,255,.40))}
    .btn.good{
      background: linear-gradient(180deg, rgba(34,197,94,.60), rgba(34,197,94,.28));
      border-color: rgba(34,197,94,.50);
    }
    .btn.danger{
      background: linear-gradient(180deg, rgba(255,77,109,.55), rgba(255,77,109,.22));
      border-color: rgba(255,77,109,.45);
    }

    .msg{
      margin-top:8px;
      padding:10px 12px;
      border-radius: 14px;
      border:1px solid var(--line);
      background: rgba(0,0,0,.18);
      color:var(--muted);
      font-size:13px;
      line-height:1.35;
    }
    .msg.ok{border-color: rgba(34,197,94,.45); color: rgba(205,255,225,.95)}
    .msg.err{border-color: rgba(255,77,109,.45); color: rgba(255,220,228,.95)}
    .msg.info{border-color: rgba(124,92,255,.45); color: rgba(225,225,255,.95)}

    .log{
      margin-top:12px;
      border-top:1px solid var(--line);
      padding-top:10px;
      display:flex;
      flex-direction:column;
      gap:8px;
      max-height: 340px;
      overflow:auto;
    }
    .item{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      padding:10px 12px;
      border:1px solid var(--line);
      border-radius: 14px;
      background: rgba(255,255,255,.04);
      font-variant-numeric: tabular-nums;
    }
    .item small{color:var(--muted)}
    .score{
      display:flex; gap:8px; align-items:center; flex-wrap:wrap;
      justify-content:flex-end;
    }
    .chip{
      padding:5px 9px;
      border-radius:999px;
      border:1px solid var(--line);
      background: rgba(255,255,255,.05);
      font-size:12px;
      color:var(--text);
      white-space:nowrap;
    }
    .chip.s{border-color: rgba(124,92,255,.45)}
    .chip.b{border-color: rgba(34,197,94,.45)}
    .chip.try{border-color: rgba(255,255,255,.16); color:var(--muted)}
    .chip.win{border-color: rgba(34,197,94,.55); background: rgba(34,197,94,.14)}

    .hint{
      margin-top:10px;
      color:var(--muted);
      font-size:12px;
    }

    .footerNote{
      margin-top:14px;
      color:rgba(255,255,255,.35);
      font-size:12px;
      text-align:center;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="title">
        <h1>숫자야구 (4자리)</h1>
        <div class="sub">중복 없는 숫자를 맞히는 게임입니다. 모드를 바꿔서 솔로 또는 컴퓨터 대결로 즐길 수 있어요.</div>
      </div>

      <div class="pillbar">
        <div class="pill">
          <span class="sub" style="margin-right:2px;">모드</span>
          <div class="seg" role="tablist" aria-label="game mode">
            <button id="modeSolo" class="active" type="button">솔로</button>
            <button id="modeDuel" type="button">대결</button>
          </div>
        </div>
        <div class="pill">
          <button id="btnNew" class="btn primary" type="button">새 게임</button>
          <button id="btnReset" class="btn" type="button">기록 초기화</button>
        </div>
      </div>
    </div>

    <div class="grid">
      <!-- Player -->
      <section class="card" aria-label="player panel">
        <div class="cardHeader">
          <div class="h">
            <strong>내 턴</strong>
            <span id="playerSub">컴퓨터의 숫자를 맞혀보세요.</span>
          </div>
          <div class="badge" id="playerBadge">시도 0</div>
        </div>

        <div class="cardBody">
          <div class="inputRow">
            <input id="guess" class="digitInput" type="text" inputmode="numeric" maxlength="4" placeholder="4자리 입력" />
            <button id="btnGuess" class="btn good" type="button">입력</button>
          </div>
          <div id="msgPlayer" class="msg info">새 게임을 시작했습니다. 숫자를 입력해 보세요.</div>

          <div class="log" id="logPlayer" aria-label="player log"></div>
          <div class="hint">팁: Enter 키로도 입력할 수 있어요.</div>
        </div>
      </section>

      <!-- Computer -->
      <section class="card" aria-label="computer panel">
        <div class="cardHeader">
          <div class="h">
            <strong>컴퓨터 턴</strong>
            <span id="cpuSub">대결 모드에서만 진행됩니다.</span>
          </div>
          <div class="badge" id="cpuBadge">시도 0</div>
        </div>

        <div class="cardBody">
          <div class="inputRow">
            <input id="mySecret" class="digitInput" type="text" inputmode="numeric" maxlength="4" placeholder="(대결) 내 숫자 설정" />
            <button id="btnSetSecret" class="btn primary" type="button">설정</button>
          </div>
          <div id="msgCpu" class="msg">대결 모드로 바꾸고, 내 숫자를 설정하면 시작합니다.</div>

          <div class="log" id="logCpu" aria-label="cpu log"></div>
          <div class="hint">대결 모드: 내 턴 → 컴퓨터 턴 순서로 번갈아 진행됩니다.</div>
        </div>
      </section>
    </div>

    <div class="footerNote">© 숫자야구 미니게임</div>
  </div>

<script>
  // -----------------------------
  // Core rules (4 unique digits)
  // Leading zero is allowed.
  // -----------------------------
  const DIGITS = [..."0123456789"];

  function shuffle(arr){
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function generateAnswer(){
    const a = shuffle([...DIGITS]);
    return a.slice(0,4).join("");
  }

  function validate4Unique(s){
    if (s.length !== 4) return "4자리로 입력해 주세요.";
    if (!/^\d{4}$/.test(s)) return "숫자만 입력해 주세요.";
    if (new Set(s).size !== 4) return "중복 없는 4자리 숫자여야 합니다.";
    return "";
  }

  function score(ans, g){
    let strikes = 0;
    for (let i=0;i<4;i++) if (ans[i] === g[i]) strikes++;
    let common = 0;
    for (const ch of g) if (ans.includes(ch)) common++;
    return { strikes, balls: common - strikes };
  }

  // -----------------------------
  // UI helpers
  // -----------------------------
  function setMsg(el, text, type=""){
    el.className = "msg" + (type ? " " + type : "");
    el.textContent = text;
  }

  function addLog(logEl, n, guess, s, b, highlight=false){
    const div = document.createElement("div");
    div.className = "item";
    div.innerHTML = `
      <div>
        <div><strong>${n}.</strong> ${guess}</div>
        <small>${highlight ? "정답!" : ""}</small>
      </div>
      <div class="score">
        <span class="chip try">TRY ${n}</span>
        <span class="chip s">${s}S</span>
        <span class="chip b">${b}B</span>
        ${highlight ? `<span class="chip win">WIN</span>` : ""}
      </div>
    `;
    logEl.prepend(div);
  }

  function sanitizeDigitsInput(inputEl){
    inputEl.value = inputEl.value.replace(/\D/g, "").slice(0,4);
  }

  // -----------------------------
  // Game state
  // -----------------------------
  let mode = "solo"; // "solo" | "duel"
  let cpuSecret = "";      // computer's secret number (always exists)
  let mySecret = "";       // player's secret number (for duel)
  let playerTries = 0;
  let cpuTries = 0;
  let duelReady = false;
  let duelOver = false;

  // Computer guessing engine (simple & solid):
  // Keep a candidate list of all 4-unique-digit numbers.
  // After each feedback, filter candidates to those consistent.
  let cpuCandidates = [];
  let lastCpuGuess = "";

  function buildCandidates(){
    const list = [];
    for (let a=0;a<=9;a++){
      for (let b=0;b<=9;b++){
        if (b===a) continue;
        for (let c=0;c<=9;c++){
          if (c===a || c===b) continue;
          for (let d=0;d<=9;d++){
            if (d===a || d===b || d===c) continue;
            list.push(`${a}${b}${c}${d}`);
          }
        }
      }
    }
    return list;
  }

  function cpuInit(){
    cpuCandidates = buildCandidates();
    lastCpuGuess = "";
  }

  function cpuPickGuess(){
    // Pick a random candidate (works fine, keeps it simple)
    const idx = Math.floor(Math.random() * cpuCandidates.length);
    return cpuCandidates[idx];
  }

  function cpuApplyFeedback(guess, s, b){
    cpuCandidates = cpuCandidates.filter(candidate => {
      const r = score(candidate, guess); // if candidate were the secret, guess would yield r
      return r.strikes === s && r.balls === b;
    });
  }

  // -----------------------------
  // Elements
  // -----------------------------
  const elModeSolo = document.getElementById("modeSolo");
  const elModeDuel = document.getElementById("modeDuel");

  const elGuess = document.getElementById("guess");
  const elBtnGuess = document.getElementById("btnGuess");
  const elBtnNew = document.getElementById("btnNew");
  const elBtnReset = document.getElementById("btnReset");

  const elPlayerBadge = document.getElementById("playerBadge");
  const elCpuBadge = document.getElementById("cpuBadge");

  const elPlayerSub = document.getElementById("playerSub");
  const elCpuSub = document.getElementById("cpuSub");

  const elMsgPlayer = document.getElementById("msgPlayer");
  const elMsgCpu = document.getElementById("msgCpu");

  const elLogPlayer = document.getElementById("logPlayer");
  const elLogCpu = document.getElementById("logCpu");

  const elMySecret = document.getElementById("mySecret");
  const elBtnSetSecret = document.getElementById("btnSetSecret");

  // -----------------------------
  // Mode handling
  // -----------------------------
  function setMode(next){
    mode = next;
    duelOver = false;

    elModeSolo.classList.toggle("active", mode === "solo");
    elModeDuel.classList.toggle("active", mode === "duel");

    // Reset panels and instructions, but keep a running "new game" flow
    if (mode === "solo"){
      elCpuSub.textContent = "대결 모드에서만 진행됩니다.";
      elPlayerSub.textContent = "컴퓨터의 숫자를 맞혀보세요.";
      setMsg(elMsgCpu, "대결 모드로 바꾸고, 내 숫자를 설정하면 시작합니다.");
      duelReady = false;
      mySecret = "";
      elMySecret.value = "";
      elMySecret.disabled = false;
      elBtnSetSecret.disabled = false;
    } else {
      elCpuSub.textContent = "내 숫자를 설정하면, 컴퓨터가 추측을 시작합니다.";
      elPlayerSub.textContent = "컴퓨터와 번갈아 맞혀보세요.";
      setMsg(elMsgCpu, "내 숫자(4자리, 중복 없음)를 먼저 설정해 주세요.", "info");
      duelReady = false;
      mySecret = "";
      elMySecret.value = "";
      elMySecret.disabled = false;
      elBtnSetSecret.disabled = false;
      cpuInit();
    }

    // New game state in any mode
    newGame();
  }

  // -----------------------------
  // New game
  // -----------------------------
  function newGame(){
    cpuSecret = generateAnswer();

    playerTries = 0;
    cpuTries = 0;

    elPlayerBadge.textContent = "시도 0";
    elCpuBadge.textContent = "시도 0";

    elLogPlayer.innerHTML = "";
    elLogCpu.innerHTML = "";

    elGuess.value = "";
    elGuess.disabled = false;
    elBtnGuess.disabled = false;

    if (mode === "solo"){
      setMsg(elMsgPlayer, "새 게임을 시작했습니다. 숫자를 입력해 보세요.", "info");
    } else {
      setMsg(elMsgPlayer, "대결 모드: 내 숫자를 설정한 뒤, 내 턴부터 시작합니다.", "info");
      setMsg(elMsgCpu, "내 숫자(4자리, 중복 없음)를 먼저 설정해 주세요.", "info");
      duelReady = false;
      duelOver = false;
      cpuInit();
    }

    elGuess.focus();
  }

  // -----------------------------
  // Player guess flow
  // -----------------------------
  function playerSubmitGuess(){
    if (duelOver) return;

    const g = elGuess.value.trim();
    const err = validate4Unique(g);
    if (err){
      setMsg(elMsgPlayer, err, "err");
      return;
    }

    if (mode === "duel" && !duelReady){
      setMsg(elMsgPlayer, "먼저 내 숫자를 설정해 주세요. (오른쪽 패널)", "err");
      return;
    }

    playerTries++;
    elPlayerBadge.textContent = `시도 ${playerTries}`;

    const { strikes, balls } = score(cpuSecret, g);
    addLog(elLogPlayer, playerTries, g, strikes, balls, strikes === 4);

    if (strikes === 4){
      if (mode === "solo"){
        setMsg(elMsgPlayer, `정답! ${playerTries}번 만에 맞혔습니다 🎉`, "ok");
        elGuess.disabled = true;
        elBtnGuess.disabled = true;
        return;
      } else {
        setMsg(elMsgPlayer, `내가 먼저 맞혔습니다! (내 시도 ${playerTries}회) 🎉`, "ok");
        duelOver = true;
        // lock both
        elGuess.disabled = true;
        elBtnGuess.disabled = true;
        elMySecret.disabled = true;
        elBtnSetSecret.disabled = true;
        setMsg(elMsgCpu, "게임 종료. 새 게임을 눌러 다시 시작하세요.", "info");
        return;
      }
    } else {
      setMsg(elMsgPlayer, `${strikes}S ${balls}B`, "info");
    }

    elGuess.value = "";
    elGuess.focus();

    // In duel mode, after player's turn, CPU takes a turn automatically.
    if (mode === "duel"){
      cpuTurn();
    }
  }

  // -----------------------------
  // Duel: set my secret & CPU turn
  // -----------------------------
  function setMySecret(){
    if (mode !== "duel") return;
    if (duelOver) return;

    const s = elMySecret.value.trim();
    const err = validate4Unique(s);
    if (err){
      setMsg(elMsgCpu, err, "err");
      return;
    }

    mySecret = s;
    duelReady = true;

    elMySecret.disabled = true;
    elBtnSetSecret.disabled = true;

    setMsg(elMsgCpu, "설정 완료! 이제 컴퓨터가 추측을 시작합니다.", "ok");
    setMsg(elMsgPlayer, "내 턴부터 시작합니다. 컴퓨터 숫자를 맞혀보세요.", "info");
    elGuess.focus();

    cpuInit();
    // 컴퓨터는 내 턴 다음에 진행되도록(규칙: 내 턴 → 컴퓨터 턴).
    // 바로 시작하고 싶으면 아래 줄 주석 해제하면 됨:
    // cpuTurn();
  }

  function cpuTurn(){
    if (mode !== "duel" || !duelReady || duelOver) return;

    // pick guess
    const guess = cpuPickGuess();
    lastCpuGuess = guess;

    cpuTries++;
    elCpuBadge.textContent = `시도 ${cpuTries}`;

    const { strikes, balls } = score(mySecret, guess);
    addLog(elLogCpu, cpuTries, guess, strikes, balls, strikes === 4);

    // apply feedback to reduce candidates
    cpuApplyFeedback(guess, strikes, balls);

    if (strikes === 4){
      setMsg(elMsgCpu, `컴퓨터가 맞혔습니다! (컴퓨터 시도 ${cpuTries}회) 🤖`, "ok");
      duelOver = true;
      elGuess.disabled = true;
      elBtnGuess.disabled = true;
      setMsg(elMsgPlayer, "게임 종료. 새 게임을 눌러 다시 시작하세요.", "info");
      return;
    } else {
      setMsg(elMsgCpu, `컴퓨터: ${strikes}S ${balls}B (남은 후보 ${cpuCandidates.length}개)`, "info");
    }
  }

  // -----------------------------
  // Record reset (just clears logs/messages; not “best score” storage)
  // -----------------------------
  function resetLogs(){
    elLogPlayer.innerHTML = "";
    elLogCpu.innerHTML = "";
    playerTries = 0;
    cpuTries = 0;
    elPlayerBadge.textContent = "시도 0";
    elCpuBadge.textContent = "시도 0";

    if (mode === "solo"){
      setMsg(elMsgPlayer, "기록을 초기화했습니다. 계속 진행하거나 새 게임을 눌러주세요.", "info");
    } else {
      setMsg(elMsgPlayer, "기록을 초기화했습니다. 계속 진행하거나 새 게임을 눌러주세요.", "info");
      setMsg(elMsgCpu, duelReady ? "계속 진행합니다." : "내 숫자를 설정하면 시작합니다.", "info");
    }
    elGuess.focus();
  }

  // -----------------------------
  // Events
  // -----------------------------
  elModeSolo.addEventListener("click", () => setMode("solo"));
  elModeDuel.addEventListener("click", () => setMode("duel"));

  elBtnNew.addEventListener("click", newGame);
  elBtnReset.addEventListener("click", resetLogs);

  elBtnGuess.addEventListener("click", playerSubmitGuess);
  elGuess.addEventListener("keydown", (e) => {
    if (e.key === "Enter") playerSubmitGuess();
  });
  elGuess.addEventListener("input", () => sanitizeDigitsInput(elGuess));

  elBtnSetSecret.addEventListener("click", setMySecret);
  elMySecret.addEventListener("keydown", (e) => {
    if (e.key === "Enter") setMySecret();
  });
  elMySecret.addEventListener("input", () => sanitizeDigitsInput(elMySecret));

  // Init
  setMode("solo");
</script>
</body>
</html>
